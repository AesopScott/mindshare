<!-- Micro-interactions Script -->
<script>
        const MARA_STORAGE_KEY = 'mindshare.frontDesk.mara.v2';
        const chatForm = document.getElementById('chat-form');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        const input = chatForm.querySelector('textarea');
        const MARA_GUIDED_WELCOME = "Welcome to Mindshare Central. I'm Mara at the front desk. I can help with Mindshare, the Mindshare Central app, or agent capability. Which would you like to explore?";
        const maraState = { sessionId: null, roleContext: null, messages: [], processing: false };

        function mindShareLocalClient() { return window.MindShareLocalClient || null; }
        function escapeHtml(value) {
            return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
        }
        function persistMaraState() {
            try {
                localStorage.setItem(MARA_STORAGE_KEY, JSON.stringify({ sessionId: maraState.sessionId, roleContext: maraState.roleContext, messages: maraState.messages }));
            } catch {}
        }
        function restoreMaraState() {
            try {
                const saved = JSON.parse(localStorage.getItem(MARA_STORAGE_KEY) || '{}');
                maraState.sessionId = saved.sessionId || null;
                maraState.roleContext = saved.roleContext || null;
                maraState.messages = Array.isArray(saved.messages) ? saved.messages : [];
            } catch { maraState.messages = []; }
        }
        function setProcessing(isProcessing) {
            maraState.processing = isProcessing;
            input.disabled = isProcessing;
            chatForm.querySelector('button[type="submit"]').disabled = isProcessing;
            typingIndicator.classList.toggle('hidden', !isProcessing);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function hasOfficeEntry() {
            return maraState.messages.some((message) => String(message.text || '').toLowerCase().includes("mara's office"));
        }
        function hasGuidedWelcome() {
            return maraState.messages.some((message) => String(message.text || '').toLowerCase().includes('mindshare central app, or agent capability'));
        }
        function renderMessages() {
            [...chatMessages.children].forEach((child) => { if (child !== typingIndicator) child.remove(); });
            maraState.messages.forEach((message) => appendMessage(message.text, message.role, { persist: false }));
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function appendMessage(text, role, options = {}) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const messageDiv = document.createElement('div');
            const safeText = escapeHtml(text);
            const normalizedRole = role === 'user' ? 'user' : role === 'system' ? 'system' : 'mara';
            if (normalizedRole === 'user') {
                messageDiv.className = 'flex gap-4 max-w-[85%] self-end flex-row-reverse slide-up';
                messageDiv.innerHTML = '<div class="w-8 h-8 rounded-full bg-primary/20 border border-primary/40 flex-shrink-0 flex items-center justify-center"><span class="material-symbols-outlined text-[16px] text-primary">person</span></div><div class="flex flex-col gap-1 items-end"><div class="bg-primary/10 p-4 rounded-xl rounded-tr-none border border-primary/20"><p class="font-body-md text-on-surface leading-relaxed">' + safeText + '</p></div><span class="text-[10px] font-label-sm text-on-surface-variant opacity-40">' + time + '</span></div>';
            } else if (normalizedRole === 'system') {
                messageDiv.className = 'flex max-w-[90%] self-center slide-up';
                messageDiv.innerHTML = '<div class="bg-surface-container-high/80 px-4 py-3 rounded-xl border border-white/10"><p class="font-label-sm text-[10px] uppercase tracking-widest text-on-surface-variant">' + safeText + '</p></div>';
            } else {
                messageDiv.className = 'flex gap-4 max-w-[85%] slide-up';
                messageDiv.innerHTML = '<div class="w-8 h-8 rounded-full bg-surface-container-high border border-primary/10 flex-shrink-0 flex items-center justify-center"><span class="material-symbols-outlined text-[16px] text-primary">smart_toy</span></div><div class="flex flex-col gap-1"><div class="bg-surface-container p-4 rounded-xl rounded-tl-none border border-white/5"><p class="font-body-md text-on-surface leading-relaxed">' + safeText + '</p></div><span class="text-[10px] font-label-sm text-on-surface-variant opacity-40">' + time + '</span></div>';
            }
            chatMessages.insertBefore(messageDiv, typingIndicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            if (options.persist !== false) {
                maraState.messages.push({ role: normalizedRole === 'mara' ? 'assistant' : normalizedRole, text });
                persistMaraState();
            }
        }
        function clearMaraWindow() {
            maraState.messages = [];
            persistMaraState();
            renderMessages();
            input.focus();
        }
        async function loadMaraOffice() {
            restoreMaraState();
            renderMessages();
            const local = mindShareLocalClient();
            if (!local?.loadRoleContext || !local?.connectClaude) {
                if (!maraState.messages.length) appendMessage('Open this page in MindShare Central to connect Mara to Claude.', 'system');
                return;
            }
            try {
                const contextPayload = await local.loadRoleContext({ roleSlug: 'mara' });
                if (!contextPayload?.ok) { appendMessage(contextPayload?.error || "Mara's role context could not be loaded.", 'system'); return; }
                maraState.roleContext = contextPayload.roleContext;
                const claudePayload = await local.connectClaude({ roleSlug: 'mara' });
                if (!claudePayload?.ok) { appendMessage(claudePayload?.message || claudePayload?.error || 'Claude CLI is not connected.', 'system'); return; }
                maraState.sessionId = claudePayload.sessionId;
                if (Array.isArray(claudePayload.messages) && claudePayload.messages.length && !maraState.messages.length) {
                    maraState.messages = claudePayload.messages.map((message) => ({ role: message.role, text: message.text || message.content || '' })).filter((message) => message.text);
                }
                if (!hasOfficeEntry()) appendMessage(claudePayload.initialMessage || "This is Mara's office.", 'user');
                if (!hasGuidedWelcome()) appendMessage(MARA_GUIDED_WELCOME, 'mara');
                else renderMessages();
                persistMaraState();
            } catch (error) { appendMessage('Mara office failed to load: ' + (error.message || error), 'system'); }
        }
        async function sendToMara() {
            const text = input.value.trim();
            if (!text || maraState.processing) return;
            const local = mindShareLocalClient();
            if (!local?.sendClaudeMessage) { appendMessage('MindShare Central is required to send messages to Mara.', 'system'); return; }
            if (!maraState.sessionId) await loadMaraOffice();
            if (!maraState.sessionId) return;
            const transcript = maraState.messages.slice(-6);
            appendMessage(text, 'user');
            input.value = '';
            setProcessing(true);
            try {
                const payload = await local.sendClaudeMessage({ sessionId: maraState.sessionId, message: text, roleContext: maraState.roleContext, transcript });
                if (!payload?.ok) { appendMessage(payload?.error || payload?.reply || 'Claude returned an error.', 'system'); return; }
                appendMessage(payload.reply || '(No response)', 'mara');
            } catch (error) { appendMessage('Lost connection to Claude: ' + (error.message || error), 'system'); }
            finally { setProcessing(false); }
        }
        document.getElementById('clear-chat-button')?.addEventListener('click', clearMaraWindow);
        chatForm.addEventListener('submit', (e) => { e.preventDefault(); sendToMara(); });
        input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendToMara();
            }
        });
        loadMaraOffice();
    </script>
