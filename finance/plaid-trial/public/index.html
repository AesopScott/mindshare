<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mindshare Finance Review</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f7;
        --ink: #17202a;
        --muted: #607080;
        --line: #d9e0e7;
        --panel: #ffffff;
        --green: #125c56;
        --red: #8f2d2d;
        --gold: #8a6512;
        --blue: #245a92;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      main {
        max-width: none;
        margin: 0 auto;
        padding: 16px 10px;
      }

      h1 {
        font-size: 26px;
        margin: 0 0 4px;
      }

      h2 {
        font-size: 18px;
        margin: 0 0 12px;
      }

      p {
        color: var(--muted);
        line-height: 1.45;
        margin: 0;
      }

      button,
      select,
      input {
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
        min-height: 36px;
      }

      button {
        background: var(--green);
        color: white;
        cursor: pointer;
        font-weight: 700;
        padding: 8px 12px;
      }

      button.secondary {
        background: #eef3f7;
        color: var(--ink);
      }

      button.include {
        background: var(--green);
      }

      button.exclude {
        background: var(--red);
      }

      button.review {
        background: var(--gold);
      }

      input,
      select {
        background: white;
        color: var(--ink);
        padding: 0 10px;
      }

      .topbar,
      .panel,
      .summary {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .topbar {
        display: grid;
        gap: 14px;
        margin-bottom: 16px;
      }

      .actions,
      .filters {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .summary {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        margin-bottom: 16px;
      }

      .metric {
        border-left: 4px solid var(--blue);
        padding-left: 10px;
      }

      .metric strong {
        display: block;
        font-size: 22px;
      }

      .table-wrap {
        max-height: 62vh;
        overflow: auto;
      }

      table {
        border-collapse: collapse;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eef2f5;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .amount {
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .merchant {
        font-weight: 700;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        border-radius: 999px;
        color: white;
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        padding: 3px 8px;
      }

      .pill.included {
        background: var(--green);
      }

      .pill.excluded {
        background: var(--red);
      }

      .pill.review {
        background: var(--gold);
      }

      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-width: 230px;
      }

      .row-actions button {
        font-size: 12px;
        min-height: 30px;
        padding: 5px 8px;
      }

      #status {
        color: var(--muted);
        min-height: 20px;
      }

      @media (max-width: 820px) {
        main {
          padding: 10px;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(120px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="topbar">
        <div>
          <h1>Mindshare Finance Review</h1>
          <p>Review transactions in the browser. AI, computer, and internet costs default in unless you exclude them.</p>
        </div>

        <div class="actions">
          <button id="sync-button">Sync Transactions</button>
          <button class="secondary" id="refresh-button">Refresh</button>
          <button class="secondary" id="link-button">Link Account</button>
          <span id="status"></span>
        </div>

        <div class="filters">
          <label>
            Status
            <select id="status-filter">
              <option value="review">Needs review</option>
              <option value="included">Included</option>
              <option value="excluded">Excluded</option>
              <option value="all">All</option>
            </select>
          </label>
          <label>
            Search
            <input id="search" placeholder="merchant, category, source" />
          </label>
        </div>
      </section>

      <section class="summary" id="summary"></section>

      <section class="panel">
        <h2>Transactions</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Merchant</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Reason</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script>
      const state = {
        q: "",
        status: "review"
      };

      const statusEl = document.querySelector("#status");
      const summaryEl = document.querySelector("#summary");
      const rowsEl = document.querySelector("#rows");
      const syncButton = document.querySelector("#sync-button");
      const refreshButton = document.querySelector("#refresh-button");
      const linkButton = document.querySelector("#link-button");
      const statusFilter = document.querySelector("#status-filter");
      const searchInput = document.querySelector("#search");

      function setStatus(value) {
        statusEl.textContent = value;
      }

      async function request(path, options = {}) {
        const response = await fetch(path, {
          headers: { "content-type": "application/json" },
          ...options
        });
        const body = await response.json();
        if (!response.ok) throw body;
        return body;
      }

      function money(value) {
        return Number(value || 0).toLocaleString(undefined, {
          currency: "USD",
          style: "currency"
        });
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      async function loadReview() {
        const params = new URLSearchParams({ status: state.status, q: state.q });
        const body = await request(`/api/classifications?${params}`);
        renderSummary(body.summary);
        renderRows(body.rows);
        setStatus(`${body.rows.length} shown`);
      }

      function renderSummary(summary) {
        summaryEl.innerHTML = [
          ["Included", summary.included_count],
          ["Included total", money(summary.included_total)],
          ["Needs review", summary.review_count],
          ["Review total", money(summary.review_total)],
          ["Transactions", summary.transaction_count]
        ]
          .map(([label, value]) => `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`)
          .join("");
      }

      function renderRows(rows) {
        if (!rows.length) {
          rowsEl.innerHTML = `<tr><td colspan="6">No transactions match.</td></tr>`;
          return;
        }

        rowsEl.innerHTML = rows
          .map(
            (row) => `
              <tr>
                <td>${escapeHtml(row.date)}</td>
                <td>
                  <div class="merchant">${escapeHtml(row.merchant)}</div>
                  <div class="muted">Group: ${escapeHtml(row.merchant_group || row.merchant)}</div>
                  <div>${escapeHtml(row.name)}</div>
                  <div class="muted">${escapeHtml(row.source)} · ${escapeHtml(row.account_owner)}</div>
                  <div class="muted">${escapeHtml(row.plaid_detailed || row.plaid_primary)}</div>
                </td>
                <td class="amount">${money(row.amount)}</td>
                <td>
                  <span class="pill ${escapeHtml(row.status)}">${escapeHtml(row.status)}</span>
                  <div class="muted">${escapeHtml(row.mindshare_category)}</div>
                  <div class="muted">${escapeHtml(row.confidence)}</div>
                </td>
                <td>${escapeHtml(row.reason)}</td>
                <td>
                  <div class="row-actions">
                    <button class="include" data-action="included" data-merchant="${escapeHtml(row.merchant_group || row.merchant)}">Include merchant</button>
                    <button class="exclude" data-action="excluded" data-merchant="${escapeHtml(row.merchant_group || row.merchant)}">Exclude merchant</button>
                    <button class="review" data-action="review" data-merchant="${escapeHtml(row.merchant_group || row.merchant)}">Review merchant</button>
                  </div>
                </td>
              </tr>
            `
          )
          .join("");
      }

      async function setMerchantOverride(merchant, status) {
        const category = status === "included" ? "manual-mindshare" : status === "excluded" ? "manual-personal" : "manual-review";
        setStatus(`Saving ${merchant}...`);
        const result = await request("/api/override-merchant", {
          method: "POST",
          body: JSON.stringify({
            merchant,
            status,
            mindshare_category: category,
            note: "set by merchant in web review"
          })
        });
        setStatus(`${result.updated} ${merchant} transactions updated`);
        await loadReview();
      }

      rowsEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        setMerchantOverride(button.dataset.merchant, button.dataset.action).catch((error) => setStatus(JSON.stringify(error)));
      });

      statusFilter.addEventListener("change", () => {
        state.status = statusFilter.value;
        loadReview().catch((error) => setStatus(JSON.stringify(error)));
      });

      searchInput.addEventListener("input", () => {
        state.q = searchInput.value;
        window.clearTimeout(searchInput._timer);
        searchInput._timer = window.setTimeout(() => loadReview().catch((error) => setStatus(JSON.stringify(error))), 250);
      });

      syncButton.addEventListener("click", async () => {
        syncButton.disabled = true;
        try {
          setStatus("Syncing...");
          await request("/api/sync", { method: "POST", body: "{}" });
          await loadReview();
        } catch (error) {
          setStatus(JSON.stringify(error));
        } finally {
          syncButton.disabled = false;
        }
      });

      refreshButton.addEventListener("click", () => loadReview().catch((error) => setStatus(JSON.stringify(error))));

      linkButton.addEventListener("click", async () => {
        linkButton.disabled = true;
        try {
          setStatus("Creating link token...");
          const { link_token } = await request("/api/link-token", { method: "POST", body: "{}" });
          const handler = Plaid.create({
            token: link_token,
            onSuccess: async (public_token, metadata) => {
              setStatus("Exchanging public token...");
              await request("/api/exchange-public-token", {
                method: "POST",
                body: JSON.stringify({ public_token, institution: metadata.institution })
              });
              await loadReview();
            },
            onExit: (error, metadata) => setStatus(JSON.stringify({ error, metadata }))
          });
          handler.open();
        } catch (error) {
          setStatus(JSON.stringify(error));
        } finally {
          linkButton.disabled = false;
        }
      });

      loadReview().catch((error) => setStatus(JSON.stringify(error)));
    </script>
  </body>
</html>
