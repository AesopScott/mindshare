<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mara Office - MindShare Central</title>
  <style>
    html {
      background: #101a34;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #101a34;
    }
    .front-desk-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(0.75rem, 2.5vw, 2rem);
    }
    .front-desk-image {
      display: block;
      width: min(100%, 1280px);
      height: auto;
      border-radius: 0;
    }
  </style>
</head>
<body>
  <main class="front-desk-shell">
    <img class="front-desk-image" src="../assets/front-desk/mara-office.png" alt="Mara Office front desk interface">
  </main>
</body>
</html>
